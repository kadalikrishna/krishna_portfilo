<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DataZen – AI Deepfake Detection</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:   #ff2d2d;
    --dim:   rgba(255,45,45,0.18);
    --white: #f0ece4;
    --dark:  #060606;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    font-family: 'DM Mono', monospace;
  }

  /* ── Card ── */
  .card {
    width: 100vw;
    height: 100vh;
    background: var(--dark);
    position: relative;
    overflow: hidden;
    color: var(--white);
    /* sharp border with a red corner accent */
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 0 1px rgba(255,45,45,0.15), 0 20px 60px rgba(0,0,0,0.8);
  }

  /* ── Dot grid ── */
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.055) 1px, transparent 1px);
    background-size: 20px 20px;
  }

  /* ── Horizontal scan lines (CRT feel) ── */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  /* ── Red corner bracket (top-right) ── */
  .corner-tl, .corner-br {
    position: absolute;
    width: 18px;
    height: 18px;
    z-index: 4;
  }
  .corner-tl {
    top: 14px; left: 14px;
    border-top: 2px solid var(--red);
    border-left: 2px solid var(--red);
  }
  .corner-br {
    bottom: 14px; right: 14px;
    border-bottom: 2px solid var(--red);
    border-right: 2px solid var(--red);
  }

  /* ── Status badge ── */
  .status {
    position: absolute;
    top: 14px;
    right: 14px;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--red);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 5px;
    z-index: 4;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.15; }
  }

  /* ── Main content ── */
  .content {
    position: relative;
    z-index: 3;
    height: 100%;
    padding: 44px 28px 28px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  /* ── "DataZen" label ── */
  .label {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* ── Big title ── */
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 0.92;
    font-weight: 400;
    letter-spacing: 0.01em;
    /* clip + gradient fill */
    background: linear-gradient(160deg, #ffffff 40%, rgba(255,255,255,0.45) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 0 0 24px;
  }

  /* ── Divider ── */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, var(--red) 0%, rgba(255,45,45,0.08) 100%);
    margin-bottom: 18px;
  }

  /* ── Bottom row ── */
  .bottom-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  /* ── Scan-box ── */
  .scan-box {
    width: 76px;
    height: 76px;
    border: 1.5px solid rgba(255,255,255,0.25);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  /* corner ticks inside box */
  .scan-box::after {
    content: "";
    position: absolute;
    inset: 0;
    border: 4px solid transparent;
    background:
      linear-gradient(var(--dark), var(--dark)) padding-box,
      linear-gradient(var(--dark), var(--dark)) padding-box;
  }
  .tick {
    position: absolute;
    width: 10px;
    height: 10px;
  }
  .tick.tl { top:  3px; left:  3px; border-top:  1.5px solid var(--red); border-left:  1.5px solid var(--red); }
  .tick.tr { top:  3px; right: 3px; border-top:  1.5px solid var(--red); border-right: 1.5px solid var(--red); }
  .tick.bl { bottom: 3px; left:  3px; border-bottom: 1.5px solid var(--red); border-left:   1.5px solid var(--red); }
  .tick.br { bottom: 3px; right: 3px; border-bottom: 1.5px solid var(--red); border-right:  1.5px solid var(--red); }

  /* scan beam */
  .scan-beam {
    position: absolute;
    width: 100%;
    height: 2px;
    background: linear-gradient(to bottom, transparent, var(--red), transparent);
    top: -4px;
    left: 0;
    animation: scan 2s linear infinite;
    box-shadow: 0 0 10px var(--red), 0 0 20px var(--dim);
  }
  /* glow trail under beam */
  .scan-beam::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 18px;
    top: 2px;
    left: 0;
    background: linear-gradient(to bottom, rgba(255,45,45,0.12), transparent);
  }
  @keyframes scan {
    0%   { top: -4px; }
    100% { top: calc(100% + 4px); }
  }

  /* scan percentage label */
  .scan-label {
    position: absolute;
    bottom: 5px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 7px;
    letter-spacing: 0.1em;
    color: var(--red);
    opacity: 0.7;
  }

  /* ── Info block ── */
  .info {
    text-align: right;
    line-height: 1.7;
  }
  .info-row {
    font-size: 8px;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }
  .info-row span {
    color: rgba(255,255,255,0.7);
    margin-left: 6px;
  }

  /* ── Ambient red glow in the card ── */
  .glow {
    position: absolute;
    bottom: -60px;
    left: -40px;
    width: 220px;
    height: 220px;
    background: radial-gradient(circle, rgba(255,30,30,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(1.15); }
  }
</style>
</head>
<body>

<section class="card">
  <!-- layers -->
  <div class="bg-grid"></div>
  <div class="scanlines"></div>
  <div class="glow"></div>

  <!-- corner accents -->
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <!-- live badge -->
  <div class="status"><span class="status-dot"></span>Live</div>

  <!-- main content -->
  <div class="content">
    <p class="label">DataZen · System v2.4</p>

    <h1>AI<br>Deep<br>fake</h1>

    <div class="divider"></div>

    <div class="bottom-row">

      <!-- scan box -->
      <div class="scan-box">
        <div class="tick tl"></div>
        <div class="tick tr"></div>
        <div class="tick bl"></div>
        <div class="tick br"></div>
        <div class="scan-beam"></div>
        <div class="scan-label">SCAN</div>
      </div>

      <!-- info -->
      <div class="info">
        <p class="info-row">Model <span>GAN-Detect</span></p>
        <p class="info-row">Accuracy <span>99.2%</span></p>
        <p class="info-row">Latency <span>~38ms</span></p>
        <p class="info-row">Status <span style="color:var(--red)">Active</span></p>
      </div>

    </div>
  </div>
</section>

</body>
</html>
